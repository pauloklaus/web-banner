name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump version and tag
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve merge commit message
        id: merge
        run: echo "message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        env:
          COMMIT_MESSAGE: ${{ steps.merge.outputs.message }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
        run: |
          NEW_VERSION=$(npx tsx scripts/update-version.ts \
            --commit "$COMMIT_MESSAGE" \
            --branch "$BRANCH_NAME")

          if [ -z "$NEW_VERSION" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Commit, tag and push
        if: steps.bump.outputs.skipped == 'false'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to $VERSION"
          git tag "v$VERSION"
          git push origin main --follow-tags
