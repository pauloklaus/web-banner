name: Release

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited, closed]

jobs:
  bump-on-pr:
    name: Bump version on PR
    if: |
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: version-bump-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump version on PR branch
        env:
          COMMIT_MESSAGE: ${{ github.event.pull_request.title }}
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          git fetch origin main

          EXPECTED_VERSION=$(npx tsx scripts/update-version.ts \
            --commit "$COMMIT_MESSAGE" \
            --branch "$BRANCH_NAME" \
            --base-ref origin/main \
            --expected-only)

          if [ -z "$EXPECTED_VERSION" ]; then
            echo "No release bump needed for this PR."
            exit 0
          fi

          CURRENT_VERSION=$(node -pe "require('./package.json').version")
          if [ "$CURRENT_VERSION" = "$EXPECTED_VERSION" ]; then
            echo "Version already at $EXPECTED_VERSION, skipping."
            exit 0
          fi

          NEW_VERSION=$(npx tsx scripts/update-version.ts \
            --commit "$COMMIT_MESSAGE" \
            --branch "$BRANCH_NAME" \
            --base-ref origin/main)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to $NEW_VERSION"
          git push origin HEAD:${{ github.head_ref }}

  tag-on-merge:
    name: Tag release on merge
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: version-tag
      cancel-in-progress: false

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create release tag
        env:
          COMMIT_MESSAGE: ${{ github.event.pull_request.title }}
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: |
          MERGE_PARENT=$(git rev-parse "${MERGE_SHA}^")

          EXPECTED_VERSION=$(npx tsx scripts/update-version.ts \
            --commit "$COMMIT_MESSAGE" \
            --branch "$BRANCH_NAME" \
            --base-ref "$MERGE_PARENT" \
            --expected-only)

          if [ -z "$EXPECTED_VERSION" ]; then
            echo "No release tag needed for this PR."
            exit 0
          fi

          VERSION=$(node -pe "require('./package.json').version")
          if [ "$VERSION" != "$EXPECTED_VERSION" ]; then
            echo "Expected version $EXPECTED_VERSION (from main at $MERGE_PARENT) but package.json has $VERSION."
            echo "Ensure the PR title or branch uses a release prefix and that bump-on-pr ran before merge."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-parse "v$VERSION^{commit}")
            if [ "$EXISTING_SHA" != "$MERGE_SHA" ]; then
              echo "Tag v$VERSION already exists at $EXISTING_SHA."
              exit 1
            fi
            echo "Tag v$VERSION already exists at merge commit, skipping."
            exit 0
          fi

          git tag "v$VERSION" "$MERGE_SHA"
          git push origin "refs/tags/v$VERSION"
