name: Release

on:
  push:
    branches: [main]

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create git tag
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          SHOULD_TAG=$(npx tsx scripts/release-version.ts --should-tag --commit "$COMMIT_MESSAGE")
          if [ "$SHOULD_TAG" != "yes" ]; then
            echo "No release tag for this commit."
            exit 0
          fi

          VERSION=$(node -pe "require('./package.json').version")
          SHA="${{ github.sha }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            EXISTING_SHA=$(git rev-parse "v$VERSION^{commit}")
            if [ "$EXISTING_SHA" != "$SHA" ]; then
              echo "Tag v$VERSION already exists at $EXISTING_SHA."
              exit 1
            fi
            echo "Tag v$VERSION already exists at this commit, skipping."
            exit 0
          fi

          git tag "v$VERSION" "$SHA"
          git push origin "refs/tags/v$VERSION"
